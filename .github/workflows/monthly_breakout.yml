name: NSE Monthly Breakout Screener

on:
  schedule:
    - cron: "30 10 1 * *"   # 1st of every month, 4:00 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Pre-flight: confirm CSV is present ──────────────────────────────────
      - name: Check input CSV exists
        run: |
          if [ ! -f "data/nse500list.csv" ]; then
            echo "❌ ERROR: data/nse500list.csv not found in repository!"
            echo "Please commit your stock list CSV to the data/ folder."
            exit 1
          fi
          echo "✅ Found data/nse500list.csv"
          echo "   Rows: $(wc -l < data/nse500list.csv)"
          echo "   Header: $(head -1 data/nse500list.csv)"

      - name: Set GitHub Pages URL
        run: |
          OWNER="${{ github.repository_owner }}"
          REPONAME="${{ github.event.repository.name }}"
          echo "PAGES_URL=https://${OWNER}.github.io/${REPONAME}/Monthly_Breakout_Report.xlsx" >> $GITHUB_ENV

      # ── Run screener ────────────────────────────────────────────────────────
      - name: Run screener
        run: |
          python nse_monthly_breakout.py
          echo "EXIT_CODE=$?" >> $GITHUB_ENV
        env:
          SEND_TELEGRAM: "false"

      # ── Verify output was actually created ──────────────────────────────────
      - name: Verify output file
        run: |
          if [ ! -f "output/Monthly_Breakout_Report.xlsx" ]; then
            echo "❌ ERROR: Script ran but output file was not created."
            echo "Check the logs above for Python errors."
            exit 1
          fi
          SIZE=$(du -h output/Monthly_Breakout_Report.xlsx | cut -f1)
          echo "✅ Report created — size: $SIZE"
          ls -lh output/

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monthly_Breakout_Report_${{ github.run_number }}
          path: output/Monthly_Breakout_Report.xlsx
          retention-days: 90

      # ── Deploy to GitHub Pages ───────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        run: |
          cp output/Monthly_Breakout_Report.xlsx /tmp/Monthly_Breakout_Report.xlsx

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages 2>/dev/null || true

          if git ls-remote --exit-code origin gh-pages 2>/dev/null; then
            git checkout gh-pages
            git pull origin gh-pages --rebase
          else
            echo "gh-pages branch not found — creating orphan branch"
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          cp /tmp/Monthly_Breakout_Report.xlsx ./Monthly_Breakout_Report.xlsx

          cat > index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>NSE Monthly Breakout Report</title>
            <style>
              body { font-family: Arial, sans-serif; max-width: 600px;
                     margin: 60px auto; padding: 0 20px; color: #1F3864; }
              h2   { border-bottom: 2px solid #1F3864; padding-bottom: 8px; }
              a.btn{ display: inline-block; background: #1F3864; color: #fff;
                     padding: 12px 24px; border-radius: 6px; text-decoration: none;
                     font-size: 15px; margin-top: 16px; }
              a.btn:hover { background: #375623; }
              p.note { color: #555; font-size: 13px; margin-top: 24px; }
            </style>
          </head>
          <body>
            <h2>📊 NSE Monthly Breakout Screener</h2>
            <p>Latest report generated on the 1st of each month.</p>
            <a class="btn" href="Monthly_Breakout_Report.xlsx">⬇ Download Report (Excel)</a>
            <p class="note">Universe: NSE 500 &nbsp;|&nbsp; Source: Yahoo Finance</p>
          </body>
          </html>
          HTML

          git add Monthly_Breakout_Report.xlsx index.html
          git commit -m "Monthly Breakout Report — $(date +'%b %Y')" || echo "Nothing new to commit"
          git push origin gh-pages

      - name: Wait for GitHub Pages CDN
        run: |
          echo "Waiting 90s for Pages to propagate..."
          sleep 90

      - name: Send Telegram alert
        run: python send_telegram_alert.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGES_URL:          ${{ env.PAGES_URL }}
