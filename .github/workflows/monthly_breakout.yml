name: NSE Monthly Breakout Screener

on:
  schedule:
    - cron: "30 10 1 * *"   # 1st of every month, 4:00 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check input CSV exists
        run: |
          if [ ! -f "data/nse500list.csv" ]; then
            echo "ERROR: data/nse500list.csv not found in repository!"
            exit 1
          fi
          echo "Found data/nse500list.csv — rows: $(wc -l < data/nse500list.csv)"

      - name: Set GitHub Pages URL
        run: |
          OWNER="${{ github.repository_owner }}"
          REPONAME="${{ github.event.repository.name }}"
          echo "PAGES_URL=https://${OWNER}.github.io/${REPONAME}/Monthly_Breakout_Report.xlsx" >> $GITHUB_ENV

      - name: Run screener
        run: python nse_monthly_breakout.py
        env:
          SEND_TELEGRAM: "false"

      - name: Verify output file
        run: |
          if [ ! -f "output/Monthly_Breakout_Report.xlsx" ]; then
            echo "ERROR: output file not created — check Python logs above"
            exit 1
          fi
          echo "Report created — size: $(du -h output/Monthly_Breakout_Report.xlsx | cut -f1)"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monthly_Breakout_Report_${{ github.run_number }}
          path: output/Monthly_Breakout_Report.xlsx
          retention-days: 90

      - name: Deploy to GitHub Pages
        run: |
          cp output/Monthly_Breakout_Report.xlsx /tmp/Monthly_Breakout_Report.xlsx

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages:gh-pages 2>/dev/null || true

          if git show-ref --verify --quiet refs/heads/gh-pages; then
            git checkout gh-pages
          else
            echo "Creating gh-pages branch for the first time"
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          cp /tmp/Monthly_Breakout_Report.xlsx ./Monthly_Breakout_Report.xlsx

          cat > index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>NSE Monthly Breakout Report</title>
            <style>
              body { font-family: Arial, sans-serif; max-width: 600px;
                     margin: 60px auto; padding: 0 20px; color: #1F3864; }
              h2   { border-bottom: 2px solid #1F3864; padding-bottom: 8px; }
              a.btn{ display: inline-block; background: #1F3864; color: #fff;
                     padding: 12px 24px; border-radius: 6px; text-decoration: none;
                     font-size: 15px; margin-top: 16px; }
              a.btn:hover { background: #375623; }
              p.note { color: #555; font-size: 13px; margin-top: 24px; }
            </style>
          </head>
          <body>
            <h2>📊 NSE Monthly Breakout Screener</h2>
            <p>Latest report generated on the 1st of each month.</p>
            <a class="btn" href="Monthly_Breakout_Report.xlsx">⬇ Download Report (Excel)</a>
            <p class="note">Universe: NSE 500 &nbsp;|&nbsp; Source: Yahoo Finance</p>
          </body>
          </html>
          HTML

          git add Monthly_Breakout_Report.xlsx index.html
          git commit -m "Monthly Breakout Report — $(date +'%b %Y')" || echo "Nothing new to commit"
          git push origin gh-pages

      - name: Wait for GitHub Pages CDN
        run: sleep 90

      - name: Send Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGES_URL:          ${{ env.PAGES_URL }}
        run: |
          python3 - << 'PYEOF'
          import json, os, requests

          token   = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          url     = os.environ.get("PAGES_URL", "")

          if not token or not chat_id:
              print("Telegram credentials not set — skipping.")
              raise SystemExit(0)

          with open("output/summary.json") as f:
              s = json.load(f)

          top      = s.get("top_tickers", [])
          top_line = ("  " + "  |  ".join(top)) if top else "  —"
          dl_line  = f'\n📥 <a href="{url}">Download Report (Excel)</a>' if url else ""

          msg = (
              f"📊 <b>NSE Monthly Breakout — {s['run_month']}</b>\n"
              f"━━━━━━━━━━━━━━━━━━━━\n"
              f"✅ Breakout stocks  : <b>{s['breakout_count']}</b>\n"
              f"🔥 Full breakout    : <b>{s['full_breakout']}</b>  "
              f"(Close &amp; Low both above prev month)\n"
              f"\n<b>Top Full-Breakout Tickers:</b>\n{top_line}"
              f"{dl_line}\n"
              f"━━━━━━━━━━━━━━━━━━━━\n"
              f"<i>Universe: NSE 500  |  Source: Yahoo Finance</i>"
          )

          r = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": msg, "parse_mode": "HTML"},
              timeout=10,
          )
          print("Telegram sent ✓" if r.ok else f"Telegram failed: {r.status_code} {r.text}")
          PYEOF
